<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevToolbox</title>
    <link rel="stylesheet" href="dashboard-base.css">
    <link rel="stylesheet" href="dashboard-components.css">
    <link rel="stylesheet" href="dashboard-theme.css">
</head>
<body>
    <!-- 移动端遮罩 -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="app" id="app">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🔧</span>
                    <span class="logo-text">DevToolbox</span>
                </div>
                <button class="sidebar-collapse-btn" id="collapseBtn" onclick="toggleCollapse()" title="折叠侧边栏">‹</button>
            </div>

            <nav class="sidebar-nav" id="sidebarNav"></nav>

            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">
                    <span class="user-avatar">🔧</span>
                    <span class="user-name" id="userName">DevToolbox</span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main" id="main">
            <!-- 顶部栏 -->
            <header class="topbar">
                <button class="menu-btn" onclick="toggleSidebar()" title="菜单">☰</button>
                <div class="search-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput"
                        placeholder="搜索工具... (按 / 聚焦)"
                        oninput="handleSearch(this.value)"
                        onkeydown="handleSearchKey(event)">
                    <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
                </div>
                <div class="topbar-actions">
                    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">☀️</button>
                </div>
            </header>

            <!-- 内容区 -->
            <div class="content" id="content">
                <!-- 由 JS 动态渲染 -->
            </div>
        </main>
    </div>

    <!-- 移动端底部导航 -->
    <nav class="bottom-nav" id="bottomNav">
        <a class="bottom-nav-item active" data-page="home" href="#home" onclick="bottomNavClick(this)">
            <span class="bottom-nav-icon">🏠</span>
            <span class="bottom-nav-label">首页</span>
        </a>
        <a class="bottom-nav-item" data-page="search" href="#" onclick="focusSearch(event)">
            <span class="bottom-nav-icon">🔍</span>
            <span class="bottom-nav-label">搜索</span>
        </a>
        <a class="bottom-nav-item" data-page="favorites" href="#favorites" onclick="bottomNavClick(this)">
            <span class="bottom-nav-icon">⭐</span>
            <span class="bottom-nav-label">收藏</span>
        </a>
        <a class="bottom-nav-item" data-page="recent" href="#recent" onclick="bottomNavClick(this)">
            <span class="bottom-nav-icon">🕐</span>
            <span class="bottom-nav-label">最近</span>
        </a>
    </nav>

    <script src="dashboard.js"></script>
</body>
</html>
