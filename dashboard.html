<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K Toolkit - Agentic Developer Toolbox</title>
    <meta name="description" content="Agentic 智能体开发者工具箱 — 92+ 工具，内置 AI 助手，支持多模型，纯前端无需登录">
    <meta name="keywords" content="developer tools,AI agent,toolkit,开发者工具箱,智能体">
    <link rel="stylesheet" href="dashboard-base.css">
    <link rel="stylesheet" href="dashboard-components.css">
    <link rel="stylesheet" href="dashboard-theme.css">
</head>
<body>
    <!-- 顶部加载进度条 -->
    <div id="top-progress"></div>
    <!-- 移动端遮罩 -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="app" id="app">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🔧</span>
                    <span class="logo-text">K Toolkit</span>
                </div>
                <button class="sidebar-collapse-btn" id="collapseBtn" onclick="toggleCollapse()" title="折叠侧边栏">‹</button>
            </div>

            <nav class="sidebar-nav" id="sidebarNav"></nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main" id="main">
            <!-- 顶部栏 -->
            <header class="topbar">
                <button class="menu-btn" onclick="toggleSidebar()" title="菜单">☰</button>
                <div class="topbar-clock" id="topbarClock"></div>
                <div class="search-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput"
                        placeholder="搜索工具... (/ 或 ⌘K)"
                        oninput="handleSearch(this.value)"
                        onfocus="if(!this.value.trim())_showSearchHistory()"
                        onkeydown="handleSearchKey(event)">
                    <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
                    <div class="search-kbd-hint" id="searchKbdHint"><kbd class="search-kbd">/</kbd></div>
                </div>
                <div class="topbar-actions">
                    <button class="theme-btn" id="langBtn" onclick="setLang(getCurrentLang()==='zh'?'en':'zh')" style="display:inline-flex;align-items:center;font-size:12px;font-weight:600;min-width:36px;justify-content:center">EN</button>
                    <button class="theme-btn" id="themeBtn" onclick="openThemePicker()" title="切换主题" style="display:inline-flex;align-items:center;justify-content:center;padding:6px"></button>
                </div>
            </header>

            <!-- 内容区 -->
            <div class="content" id="content">
                <!-- 由 JS 动态渲染 -->
            </div>
        </main>
    </div>

    <!-- 移动端底部导航 -->
    <nav class="bottom-nav" id="bottomNav">
        <a class="bottom-nav-item active" data-page="home" href="#home" onclick="bottomNavClick(this)">
            <span class="bottom-nav-icon">🏠</span>
            <span class="bottom-nav-label">首页</span>
        </a>
        <a class="bottom-nav-item" data-page="search" href="#" onclick="focusSearch(event)">
            <span class="bottom-nav-icon">🔍</span>
            <span class="bottom-nav-label">搜索</span>
        </a>
        <a class="bottom-nav-item" data-page="favorites" href="#favorites" onclick="bottomNavClick(this)">
            <span class="bottom-nav-icon">⭐</span>
            <span class="bottom-nav-label">收藏</span>
        </a>
        <a class="bottom-nav-item" data-page="recent" href="#recent" onclick="bottomNavClick(this)">
            <span class="bottom-nav-icon">🕐</span>
            <span class="bottom-nav-label">最近</span>
        </a>
    </nav>

    <script src="i18n.js"></script>
    <script src="dashboard.js"></script>
    <script src="agent/agent-loader.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
</body>
</html>
